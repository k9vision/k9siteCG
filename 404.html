<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - K9 Vision</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#3B82F6",
              "background-dark": "#111827",
              "text-dark": "#F9FAFB",
              "card-dark": "#1F2937",
              "border-dark": "#374151"
            },
            fontFamily: { display: ["Poppins", "sans-serif"] }
          }
        }
      };
    </script>
</head>
<body class="bg-background-dark font-display text-text-dark antialiased min-h-screen flex items-center justify-center">
    <div class="text-center px-6 max-w-lg">
        <span class="material-icons text-primary mb-4" style="font-size: 80px;">pets</span>
        <h1 class="text-6xl font-bold text-primary mb-4">404</h1>
        <h2 class="text-2xl font-semibold mb-4">Page Not Found</h2>
        <p class="text-gray-400 mb-8">Looks like this page wandered off the trail. Let's get you back on track.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="bg-primary text-white px-6 py-3 rounded-lg font-medium hover:bg-blue-700 transition-colors">Back to Home</a>
            <a href="/login" class="bg-card-dark border border-border-dark text-text-dark px-6 py-3 rounded-lg font-medium hover:bg-gray-700 transition-colors">Client Login</a>
        </div>
    </div>
</body>
</html>
